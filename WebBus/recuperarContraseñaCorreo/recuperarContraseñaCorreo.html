<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Restablecer Contraseña</title>
        <link rel="stylesheet" href="recuperarContraseñaCorreo.css">
    </head>
    
    <body>
        <header class="navbar">
            <div class="logo-area">
                <img src="../imagenes/iconoWebBus.png" alt="logo">
                <div>
                    <h1>WebBus</h1>
                    <p>Seguimiento del recorrido del bus en tiempo real desde una aplicación web moderna y segura</p>
                </div>
            </div>
        </header>
        
        <div class="container">
            <div class="card">
                <h2>Restablecer Contraseña</h2>
                <p>Ingresa tu nueva contraseña y confírmala para cambiar tu contraseña.</p>
                <form id="resetForm">
                    <input type="password" id="password" placeholder="Nueva contraseña" required>
                    <input type="password" id="confirmPassword" placeholder="Confirmar nueva contraseña" required>
                    <button class="btn" type="submit">Restablecer Contraseña</button>
                </form>
            </div>
        </div>
        
        <footer>
            © 2026 Web Bus - Nicole Castilla, Marlon Pertuz y Joshua Castro.
        </footer>
        <script src="recuperarContrseñaCorreo.js"></script>
    </body>
</html>
