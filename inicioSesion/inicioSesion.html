<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WebBus | Iniciar sesion</title>
        <link rel="stylesheet" href="inicioSesion.css">
    </head>
    
    <body>
        <div class="escena">
            <div class="fondo"></div>
            <div class="info-panel">
                <div class="webbus-header">
                    <img src="../imagenes/iconoWebBus.png"
                    class="iconoWebBus"
                    alt="WebBus">
                    <div class="text-container">
                        <h1>WebBus</h1>
                        <p class="subtitle">
                            Seguimiento del recorrido del bus en tiempo real desde una aplicación web moderna y segura
                        </p>
                    </div>
                </div>
            </div>
        </div>
        
        <img src = "../imagenes/bus.png"
        class = "bus">
        <div class = "login-panel">
            <h2>Iniciar sesion</h2>
            <form id="loginForm">
                <label>Correo electronico</label>
                <input type = "email" placeholder="Ingresa tu email" required>
                <label>Contraseña</label>
                <input type = "password" placeholder="Ingresa tu contraseña" required>

                <a href = "../recuperarContraseña/recuperarContraseña.html" 
                    class ="forgot">¿Olvidaste tu contraseña?
                </a>
                
                <button type = "submit">Inicar sesion</button>
                <p class = "registrarse">¿No tienes una cuenta?
                    <a href = "../registro/registro.html">Registrarse</a>
                </p>

                <p class="admin-login">
                    ¿Eres administrador? 
                    <a href="../admin/inicioSesionAdmin.html">Iniciar sesión como administrador</a>
                </p>
            </form>
        </div>
    
        <footer>
            © 2026 Web Bus - Nicole Castilla, Marlon Pertuz y Joshua Castro.
        </footer>
    
        <script src = "scriptInicioSesion.js"></script>
    </body>
</html>
